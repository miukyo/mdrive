<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary SEO Metadata -->
    <title>MDrive — Unlimited Secure Telegram-Powered Cloud Storage</title>
    <meta name="title" content="MDrive — Unlimited Secure Telegram-Powered Cloud Storage" />
    <meta name="description" content="Securely upload, download, search, share, and stream unlimited files and media using your Telegram channels as free, secure cloud storage." />
    <meta name="keywords" content="Telegram Drive, MDrive, unlimited cloud storage, secure cloud, file splitting, telegram storage, media streaming, web drive, private cloud storage" />
    <meta name="author" content="MDrive Cloud Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Theme & Mobile App Capability -->
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MDrive" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Open Graph / Facebook / Discord -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/miukyo/telegram-drive-api" />
    <meta property="og:title" content="MDrive — Unlimited Secure Telegram-Powered Cloud Storage" />
    <meta property="og:description" content="Transform your Telegram account into a secure, premium cloud drive." />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://github.com/miukyo/telegram-drive-api" />
    <meta property="twitter:title" content="MDrive — Unlimited Secure Telegram-Powered Cloud Storage" />
    <meta property="twitter:description" content="Transform your Telegram account into a secure, premium cloud drive." />
    <meta property="twitter:image" content="/favicon.svg" />

    <!-- Performance Optimization: Font Preconnections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body class="bg-[#09090b] text-[#fafafa] antialiased min-h-screen selection:bg-primary selection:text-white">
    <div id="root" class="min-h-screen flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
